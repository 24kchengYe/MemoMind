<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1219"/>
    </linearGradient>
    <marker id="a3" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0.5 L9,3 L0,5.5" fill="#4adeab"/>
    </marker>
    <marker id="a3c" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0.5 L9,3 L0,5.5" fill="#38bdf8"/>
    </marker>
    <marker id="a3y" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0.5 L9,3 L0,5.5" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg3)" rx="8"/>

  <text x="450" y="38" text-anchor="middle" fill="#c8dbe8" font-size="15" font-weight="600" letter-spacing="1.5">MEMORY EVOLUTION</text>
  <line x1="365" y1="48" x2="535" y2="48" stroke="#4adeab" stroke-width="1" opacity="0.4"/>
  <text x="450" y="65" text-anchor="middle" fill="#4a6a7a" font-size="10">how observations grow smarter over time</text>

  <!-- ═══ THE CYCLE ═══ -->
  <!-- New facts -->
  <text x="50" y="110" fill="#5a7a8a" font-size="10" font-weight="600" letter-spacing="1">NEW FACTS ARRIVE</text>

  <rect x="50" y="120" width="200" height="34" rx="4" fill="#14202e" stroke="#4adeab" stroke-width="0.8"/>
  <text x="150" y="142" text-anchor="middle" fill="#b0d0c0" font-size="10">retain("CUDA cold start &gt; 30s")</text>

  <rect x="50" y="160" width="200" height="34" rx="4" fill="#14202e" stroke="#4adeab" stroke-width="0.8"/>
  <text x="150" y="182" text-anchor="middle" fill="#b0d0c0" font-size="10">retain("patch timeout to 600s")</text>

  <rect x="50" y="200" width="200" height="34" rx="4" fill="#14202e" stroke="#4adeab" stroke-width="0.8"/>
  <text x="150" y="222" text-anchor="middle" fill="#b0d0c0" font-size="10">retain("WSL needs 8GB for CUDA")</text>

  <!-- Arrow to consolidation -->
  <line x1="250" y1="177" x2="310" y2="177" stroke="#4adeab" stroke-width="1.2" marker-end="url(#a3)"/>

  <!-- Consolidation engine -->
  <rect x="315" y="110" width="240" height="140" rx="6" fill="#162230" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="435" y="135" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600">Consolidation Engine</text>

  <text x="335" y="160" fill="#6a8a9a" font-size="10">1. Recall existing observations</text>
  <text x="335" y="178" fill="#6a8a9a" font-size="10">2. Compare with new facts</text>
  <text x="335" y="196" fill="#6a8a9a" font-size="10">3. Decide action:</text>

  <!-- Actions -->
  <rect x="350" y="206" width="60" height="22" rx="3" fill="#14302a" stroke="#4adeab" stroke-width="0.8"/>
  <text x="380" y="221" text-anchor="middle" fill="#4adeab" font-size="9" font-weight="600">CREATE</text>

  <rect x="418" y="206" width="60" height="22" rx="3" fill="#1a2838" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="448" y="221" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">UPDATE</text>

  <rect x="486" y="206" width="56" height="22" rx="3" fill="#281a1a" stroke="#f87171" stroke-width="0.8"/>
  <text x="514" y="221" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">DELETE</text>

  <!-- Arrow to result -->
  <line x1="555" y1="177" x2="610" y2="177" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#a3c)"/>

  <!-- Result observation -->
  <rect x="615" y="120" width="250" height="120" rx="6" fill="#14202e" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="740" y="142" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Evolved Observation</text>
  <line x1="635" y1="152" x2="845" y2="152" stroke="#2a2a1a" stroke-width="0.5"/>
  <text x="635" y="170" fill="#c0b080" font-size="10">PROCEDURE: patch timeout, set</text>
  <text x="635" y="185" fill="#c0b080" font-size="10">.wslconfig memory=8GB</text>
  <text x="635" y="203" fill="#c0b080" font-size="10">LESSONS: default 4GB causes OOM</text>
  <text x="635" y="218" fill="#c0b080" font-size="10">during CUDA model loading</text>
  <text x="635" y="233" fill="#c0b080" font-size="10">PREFERENCE: always 8GB+ for CUDA</text>

  <!-- ═══ TIMELINE EXAMPLE ═══ -->
  <text x="50" y="295" fill="#5a7a8a" font-size="10" font-weight="600" letter-spacing="1">EVOLUTION OVER TIME</text>

  <!-- Timeline line -->
  <line x1="80" y1="330" x2="840" y2="330" stroke="#2a4a5a" stroke-width="1.5"/>

  <!-- Week 1 -->
  <circle cx="140" cy="330" r="5" fill="#4adeab"/>
  <text x="140" y="318" text-anchor="middle" fill="#4a6a5a" font-size="9">Week 1</text>
  <rect x="80" y="345" width="120" height="55" rx="4" fill="#14202e" stroke="#4adeab" stroke-width="0.8"/>
  <text x="90" y="360" fill="#4adeab" font-size="9" font-weight="600">CREATE</text>
  <text x="90" y="375" fill="#8aaa8a" font-size="9">"CUDA needs &gt;30s</text>
  <text x="90" y="388" fill="#8aaa8a" font-size="9">to cold start"</text>

  <!-- Week 2 -->
  <circle cx="330" cy="330" r="5" fill="#38bdf8"/>
  <text x="330" y="318" text-anchor="middle" fill="#2a5a7a" font-size="9">Week 2</text>
  <rect x="270" y="345" width="120" height="55" rx="4" fill="#14202e" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="280" y="360" fill="#38bdf8" font-size="9" font-weight="600">UPDATE</text>
  <text x="280" y="375" fill="#7aaaba" font-size="9">+ "patch timeout</text>
  <text x="280" y="388" fill="#7aaaba" font-size="9">to 600s fixes it"</text>

  <!-- Week 3 -->
  <circle cx="520" cy="330" r="5" fill="#38bdf8"/>
  <text x="520" y="318" text-anchor="middle" fill="#2a5a7a" font-size="9">Week 3</text>
  <rect x="460" y="345" width="120" height="55" rx="4" fill="#14202e" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="470" y="360" fill="#38bdf8" font-size="9" font-weight="600">UPDATE</text>
  <text x="470" y="375" fill="#7aaaba" font-size="9">+ "8GB in .wslconfig</text>
  <text x="470" y="388" fill="#7aaaba" font-size="9">prevents OOM"</text>

  <!-- Week 5 -->
  <circle cx="710" cy="330" r="5" fill="#fbbf24"/>
  <text x="710" y="318" text-anchor="middle" fill="#7a6a3a" font-size="9">Week 5</text>
  <rect x="640" y="345" width="140" height="55" rx="4" fill="#1a1a14" stroke="#fbbf24" stroke-width="1"/>
  <text x="650" y="360" fill="#fbbf24" font-size="9" font-weight="600">MATURE EXPERIENCE</text>
  <text x="650" y="375" fill="#c0b070" font-size="9">Full deployment guide</text>
  <text x="650" y="388" fill="#c0b070" font-size="9">with steps + lessons</text>

  <!-- Arrows between timeline points -->
  <line x1="145" y1="330" x2="325" y2="330" stroke="#38bdf8" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="335" y1="330" x2="515" y2="330" stroke="#38bdf8" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="525" y1="330" x2="705" y2="330" stroke="#fbbf24" stroke-width="0.6" stroke-dasharray="3,3"/>

  <!-- Bottom note -->
  <rect x="50" y="430" width="800" height="40" rx="4" fill="#0d1a24" stroke="#1a3a4a" stroke-width="0.8"/>
  <text x="450" y="448" text-anchor="middle" fill="#4a6a7a" font-size="10">Observation count stays stable as experiences consolidate — no memory bloat.</text>
  <text x="450" y="462" text-anchor="middle" fill="#3a5a6a" font-size="10">Facts (world/experience) accumulate normally. Observations evolve, merge, and self-correct.</text>
</svg>
